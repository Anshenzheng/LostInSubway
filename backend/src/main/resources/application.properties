# 服务器配置
server.port=8080

# 数据源配置
spring.datasource.url=jdbc:mysql://localhost:3306/lost_in_subway?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT 配置
jwt.secret=LostInSubwaySecretKey2024ForJwtTokenGenerationVeryLongSecretKey
jwt.expiration=86400000

# 日志配置
logging.level.com.subway=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# 文件上传配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 跨域配置
cors.allowed-origins=http://localhost:4200
